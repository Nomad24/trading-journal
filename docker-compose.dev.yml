services:
  db:
    image: postgres:16-alpine
    container_name: trading_journal_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading_journal
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_journal"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: trading_journal_server_dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trading_journal?schema=public
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    command: npm run dev -- --legacy-watch
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    ports:
      - "5000:5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: trading_journal_client_dev
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_PROXY_TARGET: http://server:5000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "3000:3000"

volumes:
  postgres_data_dev:
  server_node_modules:
  client_node_modules:
