services:
  db:
    image: postgres:16-alpine
    container_name: trading_journal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading_journal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trading_journal"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    container_name: trading_journal_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/trading_journal?schema=public
      PORT: 5000
      CORS_ORIGIN: http://localhost:8080
      JWT_ACCESS_SECRET: change_me_access_secret
      JWT_REFRESH_SECRET: change_me_refresh_secret
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  client:
    build:
      context: ./client
    container_name: trading_journal_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data:
